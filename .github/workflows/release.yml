name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      level:
        description: 'Release level (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    name: Bump Version
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.cargo_release.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: Run cargo-release
        id: cargo_release
        run: |
          cargo release ${{ github.event.inputs.level }} --execute --no-confirm --no-publish
          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  build-and-release:
    name: Build and Release
    needs: bump-version
    if: always() && (github.event_name == 'push' || needs.bump-version.result == 'success')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: razermatter
            asset_name: razermatter-linux-x86_64
          - os: windows-latest
            artifact_name: razermatter.exe
            asset_name: razermatter-windows-x86_64.exe
          - os: macos-latest
            artifact_name: razermatter
            asset_name: razermatter-macos-x86_64

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.bump-version.outputs.new_tag || github.ref }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary for release (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename binary for release (Windows)
        if: matrix.os == 'windows-latest'
        run: move target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Create GitHub Release and Upload Asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && needs.bump-version.outputs.new_tag || github.ref_name }}
        run: |
          gh release create "$TAG_NAME" --generate-notes || true
          gh release upload "$TAG_NAME" ${{ matrix.asset_name }} --clobber
